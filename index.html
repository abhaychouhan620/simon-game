<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Simon Game</h2>
    <h3>Press any key to start the game</h3>
    <div class="main">
        <div class="red" type="button" id="red"></div>
        <div class="yellow" type="button" id="yellow"></div>
        <div class="green" type="button" id="green"></div>
        <div class="blue" type="button" id="blue"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
